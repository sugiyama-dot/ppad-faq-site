<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Passport AD サポート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --red: #E8001D; --red-light: #ff1a35; --sidebar-w: 240px; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      background: var(--red); color: white; height: 56px;
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .logo { width: 32px; height: 32px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo span { color: var(--red); font-weight: 900; font-size: 13px; }
    header h1 { font-size: 16px; font-weight: 700; }
    header p { font-size: 11px; opacity: 0.85; margin-top: 1px; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* サイドバー */
    .sidebar { width: var(--sidebar-w); background: #1a1a1a; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #333; }
    .new-chat-btn {
      width: 100%; background: var(--red); color: white; border: none;
      border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .new-chat-btn:hover { background: var(--red-light); }
    .sidebar-label { font-size: 11px; color: #888; padding: 12px 16px 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .history-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .history-item {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 12px; border-radius: 8px; font-size: 13px;
      color: #ccc; transition: background 0.15s;
    }
    .history-item:hover { background: #2a2a2a; color: white; }
    .history-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .delete-btn {
      background: none; border: none; color: #555; cursor: pointer;
      font-size: 14px; padding: 2px 4px; border-radius: 4px;
      flex-shrink: 0; visibility: hidden;
    }
    .history-item:hover .delete-btn { visibility: visible; }
    .delete-btn:hover { color: var(--red); background: #333; }
    .history-empty { padding: 16px; font-size: 12px; color: #666; text-align: center; }

    /* コンテンツ：iframeを常時表示 */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .iframe-wrap { flex: 1; overflow: hidden; }
    .iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    footer { text-align: center; padding: 8px; font-size: 11px; color: #aaa; background: white; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>PP</span></div>
  <div>
    <h1>Profile Passport AD サポート</h1>
    <p>位置情報広告サービス｜AIサポートセンター</p>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="newChat()">＋ 新規で質問</button>
    </div>
    <div class="sidebar-label">履歴</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">まだ質問履歴はありません</div>
    </div>
  </div>

  <div class="content">
    <div class="iframe-wrap">
      <iframe id="difyFrame" src="https://udify.app/chatbot/cbgcJILonn2PFH83" allow="microphone"></iframe>
    </div>
    <footer>© 2026 BlogWatcher Inc. ｜ サポート受付：月〜金 10:00〜18:00</footer>
  </div>
</div>

<script>
  const DIFY_URL = 'https://udify.app/chatbot/cbgcJILonn2PFH83';
  let histories = [];

  // 新規で質問：iframeをリロードして履歴に追加
  function newChat() {
    const id = Date.now();
    const label = '質問 ' + new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute: '2-digit'});
    histories.unshift({ id, label });
    renderHistory();
    document.getElementById('difyFrame').src = DIFY_URL;
  }

  // 履歴削除
  function deleteHistory(e, id) {
    e.stopPropagation();
    histories = histories.filter(h => h.id !== id);
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!histories.length) {
      list.innerHTML = '<div class="history-empty">まだ質問履歴はありません</div>';
      return;
    }
    list.innerHTML = histories.map(h => `
      <div class="history-item">
        <span class="label">💬 ${h.label}</span>
        <button class="delete-btn" onclick="deleteHistory(event, ${h.id})" title="削除">🗑</button>
      </div>
    `).join('');
  }
</script>

</body>
</html>
