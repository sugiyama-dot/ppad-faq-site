<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Passport AD サポート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --red: #E8001D; --red-light: #ff1a35; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ヘッダー */
    header {
      background: var(--red); color: white; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 32px; height: 32px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo span { color: var(--red); font-weight: 900; font-size: 13px; }
    header h1 { font-size: 16px; font-weight: 700; }
    header p { font-size: 11px; opacity: 0.85; margin-top: 1px; }
    .status-badge {
      background: rgba(255,255,255,0.2); border-radius: 20px;
      padding: 4px 12px; font-size: 11px; display: flex; align-items: center; gap: 6px;
    }
    .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* CTAバー */
    .cta-bar {
      background: #1a1a1a; padding: 10px 24px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      flex-wrap: wrap;
    }
    .cta-label { font-size: 12px; color: #888; margin-right: 4px; white-space: nowrap; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
      text-decoration: none; transition: all 0.2s; white-space: nowrap; cursor: pointer; border: none;
    }
    .cta-btn.outline {
      background: transparent; border: 1.5px solid #555; color: #ccc;
    }
    .cta-btn.outline:hover { border-color: white; color: white; }
    .cta-btn.primary {
      background: var(--red); color: white; border: 1.5px solid var(--red);
    }
    .cta-btn.primary:hover { background: var(--red-light); border-color: var(--red-light); }
    .cta-btn.feedback {
      background: transparent; border: 1.5px solid #555; color: #ccc;
      margin-left: auto;
    }
    .cta-btn.feedback:hover { border-color: #facc15; color: #facc15; }

    /* チャット */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .iframe-wrap { flex: 1; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* フッター */
    footer {
      text-align: center; padding: 8px; font-size: 11px; color: #aaa;
      background: white; border-top: 1px solid #f0f0f0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    footer a { color: #aaa; text-decoration: none; }
    footer a:hover { color: var(--red); }

    /* フィードバックモーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 14px; padding: 28px;
      width: 360px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
    }
    .modal h3 { font-size: 17px; margin-bottom: 8px; color: #1a1a1a; }
    .modal p { font-size: 13px; color: #666; margin-bottom: 20px; }
    .emoji-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .emoji-btn {
      width: 52px; height: 52px; border-radius: 50%; border: 2px solid #e0e0e0;
      background: white; font-size: 24px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .emoji-btn:hover { border-color: var(--red); transform: scale(1.15); }
    .emoji-btn.selected { border-color: var(--red); background: #fff0f1; }
    .modal textarea {
      width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px;
      padding: 10px 12px; font-size: 13px; resize: none; outline: none;
      margin-bottom: 16px; font-family: inherit;
    }
    .modal textarea:focus { border-color: var(--red); }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn {
      flex: 1; padding: 10px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    }
    .modal-btn.cancel { background: #f0f0f0; color: #555; }
    .modal-btn.cancel:hover { background: #e0e0e0; }
    .modal-btn.submit { background: var(--red); color: white; }
    .modal-btn.submit:hover { background: var(--red-light); }
    .thanks-msg { display: none; font-size: 24px; padding: 8px 0; }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div class="header-left">
    <div class="logo"><span>PP</span></div>
    <div>
      <h1>Profile Passport AD サポート</h1>
      <p>位置情報広告サービス｜AIサポートセンター</p>
    </div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    AIオンライン
  </div>
</header>

<!-- CTAバー -->
<div class="cta-bar">
  <span class="cta-label">📌 便利なリンク：</span>
  <a class="cta-btn outline" href="https://tayori.com/q/profilepassportad-question/" target="_blank">
    📖 詳しく調べる場合はこちら
  </a>
  <a class="cta-btn primary" href="https://docs.google.com/forms/d/e/1FAIpQLSeKieRRFAgvXRkr-d077MOEdGpnELAxe0kdo1Nq2Gv5ORwUMw/viewform" target="_blank">
    📊 シミュレーション依頼はこちら
  </a>
  <button class="cta-btn feedback" onclick="openFeedback()">
    💬 フィードバック
  </button>
</div>

<!-- チャット -->
<div class="content">
  <div class="iframe-wrap">
    <iframe src="https://udify.app/chatbot/cbgcJILonn2PFH83" allow="microphone"></iframe>
  </div>
</div>

<!-- フッター -->
<footer>
  <span>© 2026 BlogWatcher Inc.</span>
  <span>｜</span>
  <span>サポート受付：月〜金 10:00〜18:00</span>
  <span>｜</span>
  <a href="https://www.blogwatcher.co.jp/" target="_blank">公式サイト</a>
  <span>｜</span>
  <a href="mailto:ppad_sales@blogwatcher.co.jp">メールで問い合わせ</a>
</footer>

<!-- フィードバックモーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div id="feedbackForm">
      <h3>フィードバック</h3>
      <p>AIサポートはお役に立てましたか？</p>
      <div class="emoji-row">
        <button class="emoji-btn" onclick="selectEmoji(this, '😞')">😞</button>
        <button class="emoji-btn" onclick="selectEmoji(this, '😐')">😐</button>
        <button class="emoji-btn" onclick="selectEmoji(this, '😊')">😊</button>
        <button class="emoji-btn" onclick="selectEmoji(this, '🤩')">🤩</button>
      </div>
      <textarea id="feedbackText" rows="3" placeholder="ご意見・ご要望があればお書きください（任意）"></textarea>
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="closeFeedback()">キャンセル</button>
        <button class="modal-btn submit" onclick="submitFeedback()">送信する</button>
      </div>
    </div>
    <div class="thanks-msg" id="thanksMsg">
      <div style="font-size:48px;margin-bottom:12px;">🙏</div>
      <h3>ありがとうございました！</h3>
      <p style="margin-top:8px;font-size:13px;color:#666;">いただいたフィードバックはサービス改善に活用いたします。</p>
    </div>
  </div>
</div>

<script>
  let selectedEmoji = '';

  function openFeedback() {
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('feedbackForm').style.display = 'block';
    document.getElementById('thanksMsg').style.display = 'none';
    selectedEmoji = '';
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('feedbackText').value = '';
  }

  function closeFeedback() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeFeedback();
  }

  function selectEmoji(btn, emoji) {
    selectedEmoji = emoji;
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function submitFeedback() {
    // 送信処理（コンソールログ。必要に応じてAPIに送信可能）
    const text = document.getElementById('feedbackText').value;
    console.log('Feedback:', selectedEmoji, text);
    document.getElementById('feedbackForm').style.display = 'none';
    document.getElementById('thanksMsg').style.display = 'block';
    setTimeout(closeFeedback, 2000);
  }
</script>

</body>
</html>
