<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Passport AD サポート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    header p {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 2px;
    }
    .chat-container {
      flex: 1;
      padding: 16px;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #a0aec0;
      background: #f5f7fa;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">PP</div>
    <div>
      <h1>Profile Passport AD サポート</h1>
      <p>広告配信に関するご質問にAIがお答えします</p>
    </div>
  </header>

  <div class="chat-container">
    <iframe
      src="https://udify.app/chatbot/cbgcJILonn2PFH83"
      allow="microphone">
    </iframe>
  </div>

  <footer>
    © 2026 BlogWatcher Inc. ｜ 営業時間内（月〜金 10:00〜18:00）に担当者よりご連絡いたします
  </footer>
</body>
</html>
